spring.datasource.url=jdbc:postgresql://localhost:5432/archipelago
spring.datasource.username=archipelago_user
spring.datasource.password=change-me
spring.datasource.driver-class-name=org.postgresql.Driver

server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=12h

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.frontend-base-url=http://localhost:5173
app.mail.enabled=false
app.mail.from=no-reply@example.com
app.auth.signup-mode=public
app.auth.verification-token-ttl=PT24H
app.auth.reset-token-ttl=PT1H
app.auth.audit-hash-salt=replace-with-deployment-secret
app.auth.rate-limit.window=PT15M
app.auth.rate-limit.login=6
app.auth.rate-limit.register=5
app.auth.rate-limit.forgot-password=5
app.auth.rate-limit.reset-password=5
app.auth.rate-limit.demo=30
app.auth.rate-limit.verify=20
app.catalog.providers.curated.enabled=true
app.catalog.providers.tmdb.enabled=false
app.catalog.providers.tmdb.api-key=
app.catalog.providers.tmdb.base-url=https://api.themoviedb.org/3
