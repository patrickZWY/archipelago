spring.datasource.url=jdbc:h2:mem:archipelago;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.archipelago.model
mybatis.configuration.map-underscore-to-camel-case=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

app.frontend-base-url=http://localhost:5173
app.mail.enabled=false
app.mail.from=no-reply@archipelago.test
app.auth.signup-mode=public
app.auth.verification-token-ttl=PT24H
app.auth.reset-token-ttl=PT1H
app.auth.rate-limit.window=PT15M
app.auth.rate-limit.login=500
app.auth.rate-limit.register=500
app.auth.rate-limit.forgot-password=5
app.auth.rate-limit.reset-password=500
app.auth.rate-limit.demo=500
app.auth.rate-limit.verify=500
app.catalog.providers.curated.enabled=true
app.catalog.providers.tmdb.enabled=false
app.catalog.providers.tmdb.api-key=
app.catalog.providers.tmdb.base-url=https://api.themoviedb.org/3
